# ============================================================================
# EdgeRouter 4 — QoS / Traffic Shaping for NAKIVO Backup
# ============================================================================
# WAN: eth0 (300 Mbps upload)
# LAN: eth1
# Goal: Cap NAKIVO backup traffic to 200 Mbps max during business hours,
#        full speed 8PM–6AM, reserve 100 Mbps for business traffic at all times.
# NAKIVO Director: TCP 4443
# ============================================================================

# --- Step 1: Port Forward — NAKIVO Director (TCP 4443) ---
# Replace <QNAP_LAN_IP> with actual QNAP IP on LAN (e.g., 192.168.1.100)

set port-forward rule 10 description "NAKIVO Director"
set port-forward rule 10 forward-to address <QNAP_LAN_IP>
set port-forward rule 10 forward-to port 4443
set port-forward rule 10 original-port 4443
set port-forward rule 10 protocol tcp

# --- Step 2: Firewall — Allow NAKIVO inbound ---

set firewall name WAN_IN rule 30 action accept
set firewall name WAN_IN rule 30 description "Allow NAKIVO inbound TCP 4443"
set firewall name WAN_IN rule 30 destination port 4443
set firewall name WAN_IN rule 30 protocol tcp
set firewall name WAN_IN rule 30 state new enable

# --- Step 3: Traffic Shaping — Rate-limit NAKIVO on WAN upload ---
# Uses a traffic policy on eth0 (WAN) outbound to cap backup traffic.
# Business hours (6AM–8PM): 200 Mbps cap for all NAKIVO traffic.
# This ensures 100 Mbps minimum for business use.

# Create the traffic policy
set traffic-policy shaper NAKIVO-SHAPER bandwidth 300mbit
set traffic-policy shaper NAKIVO-SHAPER default bandwidth 100%
set traffic-policy shaper NAKIVO-SHAPER default ceiling 100%
set traffic-policy shaper NAKIVO-SHAPER default queue-type fair-queue

# Class 10: NAKIVO backup traffic (destination port 4443)
set traffic-policy shaper NAKIVO-SHAPER class 10 bandwidth 50mbit
set traffic-policy shaper NAKIVO-SHAPER class 10 ceiling 200mbit
set traffic-policy shaper NAKIVO-SHAPER class 10 description "NAKIVO Backup Traffic"
set traffic-policy shaper NAKIVO-SHAPER class 10 match NAKIVO-TRAFFIC ip destination port 4443
set traffic-policy shaper NAKIVO-SHAPER class 10 match NAKIVO-TRAFFIC ip protocol tcp
set traffic-policy shaper NAKIVO-SHAPER class 10 queue-type fair-queue
set traffic-policy shaper NAKIVO-SHAPER class 10 priority 6

# Class 20: Business traffic (everything else) — guaranteed 100 Mbps
set traffic-policy shaper NAKIVO-SHAPER class 20 bandwidth 100mbit
set traffic-policy shaper NAKIVO-SHAPER class 20 ceiling 300mbit
set traffic-policy shaper NAKIVO-SHAPER class 20 description "Business Traffic"
set traffic-policy shaper NAKIVO-SHAPER class 20 match ALL-OTHER ip protocol tcp
set traffic-policy shaper NAKIVO-SHAPER class 20 queue-type fair-queue
set traffic-policy shaper NAKIVO-SHAPER class 20 priority 1

# Apply shaper to WAN interface (outbound = upload from LAN to WAN)
set interfaces ethernet eth0 traffic-policy out NAKIVO-SHAPER

# --- Step 4: Inbound shaper (download direction — sites pushing to HQ) ---
# Apply on eth1 (LAN-facing) for inbound backup traffic from WAN

set traffic-policy shaper NAKIVO-INBOUND bandwidth 300mbit
set traffic-policy shaper NAKIVO-INBOUND default bandwidth 100%
set traffic-policy shaper NAKIVO-INBOUND default ceiling 100%

set traffic-policy shaper NAKIVO-INBOUND class 10 bandwidth 50mbit
set traffic-policy shaper NAKIVO-INBOUND class 10 ceiling 200mbit
set traffic-policy shaper NAKIVO-INBOUND class 10 description "NAKIVO Inbound Backup"
set traffic-policy shaper NAKIVO-INBOUND class 10 match NAKIVO-IN ip destination port 4443
set traffic-policy shaper NAKIVO-INBOUND class 10 match NAKIVO-IN ip protocol tcp
set traffic-policy shaper NAKIVO-INBOUND class 10 priority 6

set traffic-policy shaper NAKIVO-INBOUND class 20 bandwidth 100mbit
set traffic-policy shaper NAKIVO-INBOUND class 20 ceiling 300mbit
set traffic-policy shaper NAKIVO-INBOUND class 20 description "Business Inbound"
set traffic-policy shaper NAKIVO-INBOUND class 20 priority 1

set interfaces ethernet eth0 traffic-policy in NAKIVO-INBOUND

# --- Step 5: Commit & Save ---
# Run these after pasting the above in configure mode:
#   commit
#   save

# ============================================================================
# SCHEDULED QoS OVERRIDE — After Hours (8PM–6AM) Full Speed
# ============================================================================
# EdgeOS supports task-scheduler for time-based config changes.
# These scripts remove the ceiling cap at 8PM and re-apply at 6AM.

# After-hours script: raise NAKIVO ceiling to 300 Mbps (full pipe)
set system task-scheduler task NAKIVO-AFTERHOURS crontab-spec "0 20 * * *"
set system task-scheduler task NAKIVO-AFTERHOURS executable path "/config/scripts/nakivo-afterhours.sh"

# Business-hours script: re-apply 200 Mbps ceiling at 6AM
set system task-scheduler task NAKIVO-BUSINESSHOURS crontab-spec "0 6 * * *"
set system task-scheduler task NAKIVO-BUSINESSHOURS executable path "/config/scripts/nakivo-businesshours.sh"

